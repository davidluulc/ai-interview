services:
  app:
    image: ai-interview-app:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-replace_with_dashscope_api_key}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      QWEN_VISION_MODEL: ${QWEN_VISION_MODEL:-qwen-vl-plus}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v4}
      DASHSCOPE_RERANK_MODEL: ${DASHSCOPE_RERANK_MODEL:-qwen3-rerank}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      SECRET_KEY: ${SECRET_KEY:-replace_with_long_random_secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ai_interview:replace_with_postgres_password@db:5432/ai_interview}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    image: ai-interview-app:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-replace_with_dashscope_api_key}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      QWEN_VISION_MODEL: ${QWEN_VISION_MODEL:-qwen-vl-plus}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v4}
      DASHSCOPE_RERANK_MODEL: ${DASHSCOPE_RERANK_MODEL:-qwen3-rerank}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      SECRET_KEY: ${SECRET_KEY:-replace_with_long_random_secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ai_interview:replace_with_postgres_password@db:5432/ai_interview}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
    command: ["celery", "-A", "backend_python.celery_app.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_interview}
      POSTGRES_USER: ${POSTGRES_USER:-ai_interview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_with_postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/ai-interview.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
